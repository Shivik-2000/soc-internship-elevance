---
# Sigma Rule 1: SSH Brute Force Detection
title: SSH Brute Force Attack Detected
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: Detects SSH brute-force attacks by identifying multiple failed login attempts from a single source IP within a short time window
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
modified: 2026-04-05
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1110.001
logsource:
    product: linux
    service: auth
detection:
    selection:
        process: sshd
        message|contains:
            - 'Failed password for'
            - 'Failed password for invalid user'
            - 'authentication failure'
    timeframe: 60s
    condition: selection | count() by src_ip > 5
falsepositives:
    - Legitimate users forgetting passwords
    - Automated deployment scripts
level: high
fields:
    - timestamp
    - src_ip
    - username
    - process

---
# Sigma Rule 2: Successful SSH Login After Multiple Failures
title: SSH Login Success After Brute Force
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: stable
description: Detects a successful SSH login that follows multiple failed attempts — indicating successful brute-force
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
tags:
    - attack.initial_access
    - attack.t1078
    - attack.t1110
logsource:
    product: linux
    service: auth
detection:
    failed:
        process: sshd
        message|contains: 'Failed password'
    success:
        process: sshd
        message|contains: 'Accepted password'
    condition: failed | count() by src_ip > 3 | success
falsepositives:
    - None expected in normal operations
level: critical
fields:
    - timestamp
    - src_ip
    - username

---
# Sigma Rule 3: Privilege Escalation via Sudo
title: Privilege Escalation via Sudo to Root
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: stable
description: Detects privilege escalation when a user executes sudo su or sudo bash to gain root access
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
tags:
    - attack.privilege_escalation
    - attack.t1548
    - attack.t1548.003
logsource:
    product: linux
    service: auth
detection:
    selection:
        process: sudo
        message|contains:
            - 'COMMAND=/usr/bin/su'
            - 'COMMAND=/bin/bash'
            - 'COMMAND=/bin/sh'
            - 'USER=root'
    filter:
        user: root
    condition: selection and not filter
falsepositives:
    - Legitimate system administrators
    - Authorized maintenance scripts
level: high
fields:
    - timestamp
    - hostname
    - username
    - command

---
# Sigma Rule 4: Backdoor Account Creation
title: Suspicious New User Account Creation
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: stable
description: Detects creation of new user accounts especially with sudo privileges — indicating persistence via backdoor account
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
tags:
    - attack.persistence
    - attack.t1136
    - attack.t1136.001
logsource:
    product: linux
    service: auth
detection:
    useradd:
        process: useradd
        message|contains: 'new user'
    usermod:
        process: usermod
        message|contains:
            - 'add'
            - 'sudo'
    chpasswd:
        process: chpasswd
        message|contains: 'password changed'
    condition: useradd and (usermod or chpasswd)
falsepositives:
    - Legitimate system administration tasks
    - Onboarding automation scripts
level: high
fields:
    - timestamp
    - hostname
    - new_username
    - uid
    - gid

---
# Sigma Rule 5: Sensitive File Access by Non-Root
title: Unauthorized Access to Sensitive System Files
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: stable
description: Detects access to sensitive files like /etc/shadow or /etc/passwd outside normal administrative activity
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
tags:
    - attack.collection
    - attack.t1005
    - attack.credential_access
    - attack.t1003
logsource:
    product: linux
    category: file_access
detection:
    selection:
        file|contains:
            - '/etc/shadow'
            - '/etc/passwd'
            - '/etc/sudoers'
    filter:
        process:
            - 'login'
            - 'su'
            - 'passwd'
    condition: selection and not filter
falsepositives:
    - System backup processes
    - User management scripts
level: medium
fields:
    - timestamp
    - hostname
    - process
    - file_path
    - username

---
# Sigma Rule 6: HTTP Server Started on Non-Standard Port
title: Suspicious HTTP Server on Non-Standard Port
id: f6a7b8c9-d0e1-2345-fabc-456789012345
status: stable
description: Detects Python HTTP server or similar tools started on non-standard ports — possible exfiltration channel
author: Vaishvik Kansara — SOC Intern, Elevance Skills Technology
date: 2026-04-05
tags:
    - attack.exfiltration
    - attack.t1048
    - attack.command_and_control
logsource:
    product: linux
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'http.server'
            - 'SimpleHTTPServer'
            - 'BaseHTTPServer'
    filter_standard:
        CommandLine|contains:
            - ':80'
            - ':443'
            - ':8080'
    condition: selection and not filter_standard
falsepositives:
    - Developer testing environments
    - Legitimate web application testing
level: high
fields:
    - timestamp
    - hostname
    - process
    - command_line
    - port
